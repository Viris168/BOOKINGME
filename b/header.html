<header class="sticky top-0 z-50 w-full border-b border-slate-200 bg-white/90 backdrop-blur-md">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-4 sm:px-6 h-16">

    <!-- Left: Logo + Nav -->
    <div class="flex items-center gap-6">
      <a href="#">
        <img src="BookingME-logo-3.png" class="h-9 w-auto" alt="BookingME Logo" />
      </a>
      <nav class="hidden md:flex items-center gap-1">
        <a href="#" class="px-3 py-1.5 text-sm font-semibold text-slate-900 rounded-md hover:bg-slate-100 transition-colors">Home</a>
        <a href="#" class="px-3 py-1.5 text-sm font-medium text-slate-500 rounded-md hover:bg-slate-100 hover:text-slate-800 transition-colors">Bookings</a>
        <a href="#" class="px-3 py-1.5 text-sm font-medium text-slate-500 rounded-md hover:bg-slate-100 hover:text-slate-800 transition-colors">Places</a>
        <a href="#" class="px-3 py-1.5 text-sm font-medium text-slate-500 rounded-md hover:bg-slate-100 hover:text-slate-800 transition-colors">Support</a>
      </nav>
    </div>

    <!-- Right: Actions -->
    <div class="flex items-center gap-2">
      <label class="relative hidden md:block">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400 pointer-events-none">
          <span class="material-symbols-outlined" style="font-size:18px">search</span>
        </span>
        <input type="text" placeholder="Search destinations…"
          class="w-48 lg:w-60 rounded-lg bg-slate-100 py-2 pl-9 pr-4 text-sm placeholder:text-slate-400 focus:ring-2 focus:ring-primary focus:outline-none transition" />
      </label>

      <button class="hidden sm:flex items-center gap-1.5 h-9 px-2.5 rounded-lg text-slate-500 hover:bg-slate-100 transition-colors text-sm font-medium flex-shrink-0">
        <span class="material-symbols-outlined" style="font-size:18px">language</span>
        <span>EN / KH</span>
      </button>

      <button class="flex items-center justify-center h-9 w-9 rounded-lg text-slate-500 hover:bg-slate-100 transition-colors">
        <span class="material-symbols-outlined" style="font-size:20px">notifications</span>
      </button>

      <div class="h-8 w-8 rounded-full ring-2 ring-primary/30 overflow-hidden flex-shrink-0">
        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuCoHUHzKPDzo9O0a2RiL6P3Sc91I8aVk2Pm_Dnf6hWJ7uqPwZKkACzBch8aUAFItp0GbuGtSEaPprlvDhuPfe0LIHWXRXNS1cxCrN5Mv9u3jxkWE6VY8Rq5mks8EVbwAVlzDZtJZWioGYEOfJwvM9NT9c0hFWsePYoD_ZuWfkDnwJH42G3IW232285LRIfbkZpbZp6_Qa7VhKvqVyfWG0nAFijAZPx0ke7It5mGMAI91GpgRYm_Ifk0Uzy1Et57HQ4yVpFSRsM6oSuV"
          alt="User" class="h-full w-full object-cover" />
      </div>

      <button id="menu-toggle"
        class="flex md:hidden items-center justify-center h-9 w-9 rounded-lg text-slate-500 hover:bg-slate-100 transition-colors">
        <span class="material-symbols-outlined" style="font-size:22px">menu</span>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div id="mobile-menu" class="md:hidden border-t border-slate-100 bg-white" style="max-height:0;overflow:hidden;transition:max-height 0.3s ease;">
    <div class="px-4 py-3 flex flex-col gap-1">
      <label class="relative mb-1">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400 pointer-events-none">
          <span class="material-symbols-outlined" style="font-size:18px">search</span>
        </span>
        <input type="text" placeholder="Search destinations…"
          class="w-full rounded-lg bg-slate-100 py-2 pl-9 pr-4 text-sm placeholder:text-slate-400 focus:ring-2 focus:ring-primary focus:outline-none" />
      </label>
      <a href="#" class="px-3 py-2 text-sm font-semibold text-slate-900 rounded-md hover:bg-slate-100">Home</a>
      <a href="#" class="px-3 py-2 text-sm font-medium text-slate-600 rounded-md hover:bg-slate-100">Bookings</a>
      <a href="#" class="px-3 py-2 text-sm font-medium text-slate-600 rounded-md hover:bg-slate-100">Places</a>
      <a href="#" class="px-3 py-2 text-sm font-medium text-slate-600 rounded-md hover:bg-slate-100">Support</a>
      <div class="mt-1 pt-2 border-t border-slate-100">
        <button class="flex items-center gap-2 px-3 py-2 w-full text-sm font-medium text-slate-600 rounded-md hover:bg-slate-100">
          <span class="material-symbols-outlined" style="font-size:18px">language</span>
          EN / KH
        </button>
      </div>
    </div>
  </div>
</header>
